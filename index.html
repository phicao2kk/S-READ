<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>S-READ • Hệ thống luyện đọc AI</title>
    
    <!-- Tailwind + Fonts + Icons -->
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    
    <!-- Thư viện xử lý File (PDF & Word) -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.4.120/pdf.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/mammoth/1.6.0/mammoth.browser.min.js"></script>

    <style>
        :root { --primary: #6366f1; --accent: #22d3ee; --bg: #020617; --glass: rgba(15, 23, 42, 0.8); }
        body { font-family: 'Plus Jakarta Sans', sans-serif; background: var(--bg); color: #f8fafc; min-height: 100vh; }
        .mesh-bg { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: -1; background-image: radial-gradient(at 0% 0%, rgba(99, 102, 241, 0.18) 0px, transparent 50%), radial-gradient(at 100% 100%, rgba(34, 211, 238, 0.12) 0px, transparent 50%); filter: blur(80px); }
        .glass { background: var(--glass); backdrop-filter: blur(20px); border: 1px solid rgba(255, 255, 255, 0.08); }
        .btn-main { background: linear-gradient(135deg, var(--primary), #4f46e5); transition: all 0.3s; box-shadow: 0 8px 20px -6px rgba(99, 102, 241, 0.5); }
        .btn-main:hover:not(:disabled) { transform: translateY(-2px); filter: brightness(1.1); }
        .btn-main:disabled { opacity: 0.5; cursor: not-allowed; }
        .quiz-opt { transition: all 0.2s; border: 1px solid rgba(255,255,255,0.1); }
        .quiz-opt:hover { background: rgba(255,255,255,0.05); border-color: var(--primary); }
        .quiz-opt.selected { background: var(--primary) !important; border-color: var(--primary); color: white; }
        .quiz-opt.correct { background: #10b981 !important; border-color: #10b981; color: white; }
        .quiz-opt.wrong { background: #ef4444 !important; border-color: #ef4444; color: white; }
        ::-webkit-scrollbar { width: 5px; }
        ::-webkit-scrollbar-thumb { background: rgba(99, 102, 241, 0.3); border-radius: 10px; }
    </style>
</head>
<body>
<div class="mesh-bg"></div>

<!-- NAVBAR -->
<nav class="fixed top-0 left-0 right-0 h-20 flex items-center justify-between px-6 lg:px-12 backdrop-blur-3xl bg-[#020617]/80 z-[100] border-b border-white/5">
    <div class="flex items-center gap-3">
        <div class="w-10 h-10 rounded-xl bg-indigo-600 flex items-center justify-center shadow-lg shadow-indigo-500/20">
            <i class="fa-solid fa-book-open-reader text-white"></i>
        </div>
        <div>
            <span class="text-xl font-black tracking-tighter uppercase italic text-white">S-READ AI</span>
            <span class="block text-[7px] font-black tracking-[3px] text-indigo-400 uppercase">Smart Reading System</span>
        </div>
    </div>
    <div class="hidden lg:flex gap-4">
        <button class="text-[10px] font-black uppercase tracking-widest text-indigo-400">Hệ thống luyện đọc thông minh</button>
    </div>
</nav>

<main class="pt-28 pb-12 px-4 lg:px-8 max-w-[1400px] mx-auto">
    <div class="grid grid-cols-1 lg:grid-cols-12 gap-8">
        
        <!-- CỘT TRÁI: NHẬP LIỆU -->
        <div class="lg:col-span-4 space-y-6">
            <div class="glass p-6 rounded-[32px] border-t-4 border-indigo-500">
                <h3 class="text-[10px] font-black text-indigo-400 uppercase tracking-[4px] mb-6 flex items-center gap-2">
                    <i class="fa-solid fa-wand-magic-sparkles"></i> TẠO ĐỀ BẰNG AI
                </h3>
                
                <div class="space-y-4">
                    <textarea id="input-text" rows="10" placeholder="Dán nội dung bài đọc hoặc câu hỏi tiếng Anh vào đây..." 
                        class="w-full px-5 py-4 rounded-2xl bg-white/5 border border-white/10 text-white text-sm focus:border-indigo-500/50 transition-all outline-none resize-none"></textarea>
                    
                    <div class="grid grid-cols-2 gap-3">
                        <button onclick="document.getElementById('file-input').click()" class="py-3 bg-white/5 hover:bg-white/10 border border-white/10 rounded-xl text-[9px] font-black uppercase tracking-widest transition-all">
                            <i class="fa-solid fa-file-pdf mr-2"></i> File PDF/Word
                        </button>
                        <button onclick="document.getElementById('input-text').value=''" class="py-3 bg-red-500/10 hover:bg-red-500/20 border border-red-500/20 rounded-xl text-[9px] font-black uppercase tracking-widest text-red-400 transition-all">
                            Xóa nội dung
                        </button>
                    </div>
                    <input type="file" id="file-input" accept=".pdf,.docx" class="hidden" onchange="handleFileSelect(this)">

                    <button id="generate-btn" onclick="createQuiz()" class="btn-main w-full py-5 rounded-2xl text-white uppercase text-xs font-black tracking-[2px] flex items-center justify-center gap-2">
                        PHÂN TÍCH & TẠO ĐỀ
                    </button>
                </div>
            </div>
        </div>

        <!-- CỘT PHẢI: HIỂN THỊ BÀI TẬP -->
        <div class="lg:col-span-8">
            <!-- Màn hình trống -->
            <div id="reader-empty" class="glass h-[600px] rounded-[40px] flex flex-col items-center justify-center text-center p-12 border border-white/5">
                <div class="w-20 h-20 bg-indigo-500/10 rounded-full flex items-center justify-center mb-6">
                    <i class="fa-solid fa-cloud-arrow-up text-3xl text-indigo-500"></i>
                </div>
                <h3 class="text-xl font-black text-white uppercase italic mb-2">Chưa có dữ liệu</h3>
                <p class="text-slate-500 text-sm max-w-sm font-medium">Hãy dán văn bản hoặc tải lên tài liệu để AI bắt đầu thiết kế bài tập cho bạn.</p>
            </div>

            <!-- Khu vực bài tập -->
            <div id="reader-display" class="hidden space-y-6 animate-in fade-in slide-in-from-bottom-4 duration-500">
                <div class="glass p-8 lg:p-10 rounded-[40px] border border-white/10">
                    <h2 id="quiz-title" class="text-2xl lg:text-3xl font-black italic tracking-tighter text-indigo-400 mb-6"></h2>
                    <div id="quiz-passage" class="text-slate-200 leading-relaxed text-lg space-y-4 whitespace-pre-wrap font-medium"></div>
                </div>

                <div id="quiz-questions" class="space-y-6"></div>

                <button id="submit-quiz-btn" onclick="checkAnswers()" class="btn-main w-full py-6 rounded-[2rem] font-black uppercase tracking-widest text-white shadow-2xl mt-8">
                    NỘP BÀI & KIỂM TRA ĐÁP ÁN
                </button>
            </div>
        </div>
    </div>
</main>

<script>
    // --- 1. CẤU HÌNH PDF.JS WORKER ---
    pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.4.120/pdf.worker.min.js';

    let currentQuizData = null;
    let userSelections = {};

    const S_Notify = {
        alert: (msg, type='success') => {
            alert(msg); // Bạn có thể thay bằng Toast UI từ bản S-VOICE cũ
        }
    };

    // --- 2. TRÍCH XUẤT VĂN BẢN TỪ FILE ---
    async function handleFileSelect(input) {
        const file = input.files[0];
        if (!file) return;
        
        const textarea = document.getElementById('input-text');
        textarea.placeholder = "Đang trích xuất dữ liệu...";

        try {
            if (file.type === "application/pdf") {
                const reader = new FileReader();
                reader.onload = async function() {
                    const typedarray = new Uint8Array(this.result);
                    const pdf = await pdfjsLib.getDocument(typedarray).promise;
                    let fullText = "";
                    for (let i = 1; i <= pdf.numPages; i++) {
                        const page = await pdf.getPage(i);
                        const textContent = await page.getTextContent();
                        fullText += textContent.items.map(item => item.str).join(" ") + "\n";
                    }
                    textarea.value = fullText;
                };
                reader.readAsArrayBuffer(file);
            } else {
                const reader = new FileReader();
                reader.onload = async function(e) {
                    const result = await mammoth.extractRawText({ arrayBuffer: e.target.result });
                    textarea.value = result.value;
                };
                reader.readAsArrayBuffer(file);
            }
        } catch (e) {
            S_Notify.alert("Không thể đọc file này!", "error");
        }
    }

    // --- 3. GỌI API VERCEL (DEEPSEEK AI) ---
    async function createQuiz() {
        const rawText = document.getElementById('input-text').value.trim();
        if (!rawText) return alert("Vui lòng nhập nội dung!");

        const btn = document.getElementById('generate-btn');
        btn.disabled = true;
        btn.innerHTML = `<i class="fa-solid fa-circle-notch animate-spin"></i> AI ĐANG SOẠN ĐỀ...`;

        try {
            const response = await fetch('/api/generate-quiz', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ content: rawText })
            });

            if (!response.ok) throw new Error("Lỗi Server");

            currentQuizData = await response.json();
            renderQuiz(currentQuizData);
            
        } catch (error) {
            console.error(error);
            alert("Lỗi kết nối với AI. Hãy thử lại!");
        } finally {
            btn.disabled = false;
            btn.innerHTML = "PHÂN TÍCH & TẠO ĐỀ";
        }
    }

    // --- 4. HIỂN THỊ ĐỀ THI ---
    function renderQuiz(data) {
        userSelections = {};
        document.getElementById('reader-empty').classList.add('hidden');
        document.getElementById('reader-display').classList.remove('hidden');

        document.getElementById('quiz-title').innerText = data.title || "Reading Comprehension";
        document.getElementById('quiz-passage').innerText = data.passage;

        const qContainer = document.getElementById('quiz-questions');
        qContainer.innerHTML = '';

        data.questions.forEach((q, qIdx) => {
            const qDiv = document.createElement('div');
            qDiv.className = "glass p-6 lg:p-8 rounded-[32px] border border-white/5 space-y-5";
            qDiv.innerHTML = `
                <div class="flex items-start gap-4">
                    <span class="w-8 h-8 rounded-full bg-indigo-500/20 text-indigo-400 flex-shrink-0 flex items-center justify-center font-bold text-xs">${qIdx + 1}</span>
                    <p class="text-white font-bold text-base leading-snug">${q.question}</p>
                </div>
                <div class="grid grid-cols-1 gap-3 ml-12">
                    ${q.options.map((opt, oIdx) => `
                        <button onclick="selectOption(${qIdx}, ${oIdx})" 
                            id="q${qIdx}-o${oIdx}" 
                            class="quiz-opt text-left p-4 rounded-2xl bg-white/5 text-xs lg:text-sm text-slate-300 transition-all flex items-center gap-3">
                            <span class="w-6 h-6 rounded-lg bg-white/5 flex items-center justify-center text-[10px] font-bold">${String.fromCharCode(65 + oIdx)}</span>
                            ${opt}
                        </button>
                    `).join('')}
                </div>
            `;
            qContainer.appendChild(qDiv);
        });
        window.scrollTo({ top: 0, behavior: 'smooth' });
    }

    // --- 5. LOGIC CHỌN & CHẤM ĐIỂM ---
    function selectOption(qIdx, oIdx) {
        userSelections[qIdx] = oIdx;
        document.querySelectorAll(`[id^="q${qIdx}-o"]`).forEach(btn => btn.classList.remove('selected'));
        document.getElementById(`q${qIdx}-o${oIdx}`).classList.add('selected');
    }

    function checkAnswers() {
        if (!currentQuizData) return;
        
        let score = 0;
        currentQuizData.questions.forEach((q, qIdx) => {
            const correctIdx = parseInt(q.answer);
            const userIdx = userSelections[qIdx];

            document.querySelectorAll(`[id^="q${qIdx}-o"]`).forEach(btn => {
                btn.classList.remove('selected');
                btn.disabled = true;
            });

            if (userIdx === correctIdx) {
                score++;
                document.getElementById(`q${qIdx}-o${userIdx}`).classList.add('correct');
            } else {
                if (userIdx !== undefined) document.getElementById(`q${qIdx}-o${userIdx}`).classList.add('wrong');
                document.getElementById(`q${qIdx}-o${correctIdx}`).classList.add('correct');
            }
        });

        if (score === currentQuizData.questions.length) {
            confetti({ particleCount: 200, spread: 70, origin: { y: 0.6 } });
        }
        alert(`KẾT QUẢ: ${score}/${currentQuizData.questions.length} câu đúng!`);
    }
</script>
</body>
</html>
